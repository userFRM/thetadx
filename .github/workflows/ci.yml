name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo test --workspace

  build-ffi:
    name: Build FFI (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact-name: ffi-linux-x86_64
            artifact-path: |
              target/release/libthetadatadx_ffi.so
              target/release/libthetadatadx_ffi.a
          - os: macos-latest
            artifact-name: ffi-macos-arm64
            artifact-path: |
              target/release/libthetadatadx_ffi.dylib
              target/release/libthetadatadx_ffi.a
          - os: windows-latest
            artifact-name: ffi-windows-x86_64
            artifact-path: |
              target/release/thetadatadx_ffi.dll
              target/release/thetadatadx_ffi.dll.lib
    runs-on: ${{ matrix.os }}
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo build --release -p thetadatadx-ffi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [test, build-ffi]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: cargo publish -p tdbe --allow-dirty || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30
      - run: cargo publish -p thetadatadx --allow-dirty || true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-crate, build-ffi]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ffi-linux-x86_64
          path: artifacts/linux/
      - uses: actions/download-artifact@v4
        with:
          name: ffi-macos-arm64
          path: artifacts/macos/
      - uses: actions/download-artifact@v4
        with:
          name: ffi-windows-x86_64
          path: artifacts/windows/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/linux/libthetadatadx_ffi.so
            artifacts/linux/libthetadatadx_ffi.a
            artifacts/macos/libthetadatadx_ffi.dylib
            artifacts/macos/libthetadatadx_ffi.a
            artifacts/windows/thetadatadx_ffi.dll
            artifacts/windows/thetadatadx_ffi.dll.lib
