# thetadatadx configuration (Java-compatible .properties format)
#
# This file uses the same format as ThetaData's config_0.properties.
# Copy to `config.properties` and edit as needed.
# All time values are in milliseconds.

#------------------------------------------------ Connectivity ------------------------------------------------
# MDDS region: which server group to connect to for historical data.
# The v3 protocol uses gRPC over TLS to mdds-01.thetadata.us:443.
MDDS_REGION=MDDS_NJ_HOSTS

# FPSS region: which server group to connect to for real-time streaming.
FPSS_REGION=FPSS_NJ_HOSTS

#------------------------------------------------ Timeouts ------------------------------------------------
# How long to wait before reconnecting after a disconnect (ms).
# config_0.properties says 1000, but FPSSClient.RECONNECT_DELAY_MS = 2000 at runtime.
RECONNECT_WAIT=2000

# How long to wait for a response before considering the connection dead (ms).
MDDS_TIMEOUT=10000
FPSS_TIMEOUT=10000

#------------------------------------------------ MDDS HOSTS ------------------------------------------------
# MDDS v3 uses gRPC over TLS. The host below is the gRPC endpoint.
MDDS_GRPC_HOST=mdds-01.thetadata.us
MDDS_GRPC_PORT=443
MDDS_GRPC_TLS=true

# Legacy MDDS TCP hosts (v1/v2 protocol, kept for reference).
MDDS_NJ_HOSTS=nj-a.thetadata.us:12000,nj-a.thetadata.us:12001,nj-b.thetadata.us:12000,nj-b.thetadata.us:12001
MDDS_STAGE_HOSTS=nj-a.thetadata.us:12100,test-server.thetadata.us:12100,test-server.thetadata.us:12101
MDDS_DEV_HOSTS=nj-a.thetadata.us:12200,test-server.thetadata.us:12200,test-server.thetadata.us:12201

#------------------------------------------------ FPSS HOSTS ------------------------------------------------
# Production servers (New Jersey datacenter). Tried in order, left to right.
FPSS_NJ_HOSTS=nj-a.thetadata.us:20000,nj-a.thetadata.us:20001,nj-b.thetadata.us:20000,nj-b.thetadata.us:20001

# Staging (occasional reboots, may have data issues).
FPSS_STAGE_HOSTS=nj-a.thetadata.us:20100,test-server.thetadata.us:20100,test-server.thetadata.us:20101

# Dev (frequent reboots, replays historical data in a loop).
FPSS_DEV_HOSTS=nj-a.thetadata.us:20200,test-server.thetadata.us:20200,test-server.thetadata.us:20201

#------------------------------------------------ Streaming ------------------------------------------------
# FPSS event buffer depth. Increase if you're dropping stream messages.
FPSS_QUEUE_DEPTH=1000000

# FPSS ping interval (ms). Protocol requires 100ms.
FPSS_PING_INTERVAL=100
