# ---------------------------------------------------------------------------
# COMPONENTS
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: header
      name: X-Session-UUID
      description: |
        Session UUID obtained by authenticating credentials against the Nexus HTTP API.
        The SDK handles this automatically via `ThetaDataDx::connect()`.

  schemas:
    OhlcTick: *ohlc-tick
    TradeTick: *trade-tick
    QuoteTick: *quote-tick
    EodTick: *eod-tick
    OpenInterestTick: *open-interest-tick
    TradeQuoteTick: *trade-quote-tick
    GreeksResult: *greeks-result
    DataTable: *data-table

    ContractSpec:
      type: object
      description: Option contract specification
      required: [symbol, expiration]
      properties:
        symbol:
          type: string
          description: Underlying symbol (e.g. "SPY")
        expiration:
          type: string
          description: Expiration date in YYYYMMDD format
        strike:
          type: string
          description: Strike price as scaled integer string
        right:
          type: string
          enum: [C, P]
          description: '"C" for call, "P" for put'

    Contract:
      type: object
      description: Full contract representation used in streaming
      properties:
        root:
          type: string
          description: Underlying symbol
        sec_type:
          type: integer
          enum: [0, 1, 2, 3]
          description: '0=Stock, 1=Option, 2=Index, 3=Rate'
        exp_date:
          type: integer
          description: Expiration as YYYYMMDD integer (options only)
        is_call:
          type: boolean
          description: true=call, false=put (options only)
        strike:
          type: integer
          description: Scaled integer strike price (options only)

    Price:
      type: object
      description: |
        Fixed-point price with variable decimal precision.
        Formula: real_price = value * 10^(price_type - 10)
      properties:
        value:
          type: integer
        price_type:
          type: integer

    FpssEvent:
      type: object
      description: Real-time streaming event from FPSS
      oneOf:
        - type: object
          properties:
            type:
              type: string
              enum: [Quote]
            contract_id:
              type: integer
            ms_of_day:
              type: integer
            bid:
              type: integer
            ask:
              type: integer
            bid_size:
              type: integer
            ask_size:
              type: integer
            bid_exchange:
              type: integer
            ask_exchange:
              type: integer
            date:
              type: integer
        - type: object
          properties:
            type:
              type: string
              enum: [Trade]
            contract_id:
              type: integer
            ms_of_day:
              type: integer
            sequence:
              type: integer
            price:
              type: integer
            size:
              type: integer
            exchange:
              type: integer
            condition:
              type: integer
            date:
              type: integer
        - type: object
          properties:
            type:
              type: string
              enum: [OpenInterest]
            contract_id:
              type: integer
            ms_of_day:
              type: integer
            open_interest:
              type: integer
            date:
              type: integer

    Error:
      type: object
      properties:
        code:
          type: string
          enum: [Auth, Http, Grpc, NoData]
        message:
