openapi: 3.1.0

info:
  title: ThetaDataDx SDK
  description: |
    Multi-language SDK for ThetaData market data. Provides typed access to 61 historical
    data endpoints via MDDS/gRPC and real-time streaming via FPSS/TCP. Native bindings for
    Rust, Python (PyO3), Go (CGo), and C++ (C FFI).

    All dates use YYYYMMDD format. Times use milliseconds since midnight ET.
    Intervals use milliseconds (e.g. "60000" for 1-minute bars).
    Prices are fixed-point integers decoded via price_type.
  version: 1.0.0
  contact:
    name: ThetaDataDx
    url: https://github.com/userFRM/thetadatadx
  license:
    name: Proprietary
    url: https://thetadata.net/terms

servers:
  - url: grpc://mdds.thetadata.us
    description: ThetaData MDDS production gRPC server (TLS)

tags:
  - name: Stock / List
    description: Enumerate available stock symbols and dates
  - name: Stock / Snapshot
    description: Real-time stock snapshots (OHLC, trade, quote, market value)
  - name: Stock / History
    description: Historical stock data (EOD, intraday OHLC, trades, quotes)
  - name: Stock / AtTime
    description: Stock data at a specific time of day across a date range
  - name: Option / List
    description: Enumerate option symbols, dates, expirations, strikes, and contracts
  - name: Option / Snapshot
    description: Real-time option snapshots (OHLC, trade, quote, OI, market value)
  - name: Option / Snapshot Greeks
    description: Real-time option Greeks snapshots (IV, all, first/second/third order)
  - name: Option / History
    description: Historical option data (EOD, intraday OHLC, trades, quotes, OI)
  - name: Option / History Greeks
    description: Historical option Greeks (EOD, intraday, IV, first/second/third order)
  - name: Option / History Trade Greeks
    description: Greeks computed on each individual option trade
  - name: Option / AtTime
    description: Option data at a specific time of day across a date range
  - name: Index / List
    description: Enumerate available index symbols and dates
  - name: Index / Snapshot
    description: Real-time index snapshots (OHLC, price, market value)
  - name: Index / History
    description: Historical index data (EOD, intraday OHLC, price)
  - name: Index / AtTime
    description: Index data at a specific time of day across a date range
  - name: Calendar
    description: Market calendar operations (open today, date info, yearly calendar)
  - name: Interest Rate
    description: Interest rate data endpoints

security:
  - sessionAuth: []

# ---------------------------------------------------------------------------
# Reusable anchors for common parameter/schema objects
# ---------------------------------------------------------------------------
x-anchors:
  # --- Common parameter shapes ---
  symbol-param: &symbol-param
    name: symbol
    in: query
    required: true
    schema:
      type: string
    description: Ticker symbol (e.g. "AAPL")

  symbols-param: &symbols-param
    name: symbol
    in: query
    required: true
    schema:
      type: array
      items:
        type: string
    description: One or more ticker symbols

  start_date-param: &start_date-param
    name: start_date
    in: query
    required: true
    schema:
      type: string
      pattern: '^\d{8}$'
    description: Start date in YYYYMMDD format

  end_date-param: &end_date-param
    name: end_date
    in: query
    required: true
    schema:
      type: string
      pattern: '^\d{8}$'
    description: End date in YYYYMMDD format

  date-param: &date-param
    name: date
    in: query
    required: true
    schema:
      type: string
      pattern: '^\d{8}$'
    description: Date in YYYYMMDD format

  date-optional-param: &date-optional-param
    name: date
    in: query
    required: false
    schema:
      type: string
      pattern: '^\d{8}$'
    description: Date in YYYYMMDD format (optional when using start_date/end_date)

  interval-param: &interval-param
    name: interval
    in: query
    required: true
    schema:
      type: string
    description: Bar interval in milliseconds (e.g. "60000" for 1-minute bars)

  time_of_day-param: &time_of_day-param
    name: time_of_day
    in: query
    required: true
    schema:
      type: string
    description: Milliseconds from midnight ET (e.g. "34200000" for 9:30 AM ET)

  venue-param: &venue-param
    name: venue
    in: query
    required: false
    schema:
      type: string
    description: Data venue (e.g. "nqb" for Nasdaq Basic)

  min_time-param: &min_time-param
    name: min_time
    in: query
    required: false
    schema:
      type: string
    description: Minimum timestamp filter

  start_time-param: &start_time-param
    name: start_time
    in: query
    required: false
    schema:
      type: string
    description: Start time in milliseconds from midnight ET

  end_time-param: &end_time-param
    name: end_time
    in: query
    required: false
    schema:
      type: string
    description: End time in milliseconds from midnight ET

  request_type-param: &request_type-param
    name: request_type
    in: query
    required: true
    schema:
      type: string
      enum: [EOD, TRADE, QUOTE, OHLC, OPEN_INTEREST]
    description: The type of data request

  expiration-param: &expiration-param
    name: expiration
    in: query
    required: true
    schema:
      type: string
      pattern: '^\d{8}$'
    description: Option expiration date in YYYYMMDD format

  strike-param: &strike-param
    name: strike
    in: query
    required: true
    schema:
      type: string
    description: Strike price as scaled integer string (e.g. "500000" for $500)

  right-param: &right-param
    name: right
    in: query
    required: true
    schema:
      type: string
      enum: [C, P]
    description: Option right -- "C" for call, "P" for put

  max_dte-param: &max_dte-param
    name: max_dte
    in: query
    required: false
    schema:
      type: integer
    description: Maximum days to expiration filter

  strike_range-param: &strike_range-param
    name: strike_range
    in: query
    required: false
    schema:
      type: integer
    description: Number of strikes above/below ATM to include

  exclusive-param: &exclusive-param
    name: exclusive
    in: query
    required: false
    schema:
      type: boolean
    description: Whether time boundaries are exclusive

  # --- Greeks optional parameters ---
  annual_dividend-param: &annual_dividend-param
    name: annual_dividend
    in: query
    required: false
    schema:
      type: number
      format: double
    description: Annual dividend amount for Greeks calculation

  rate_type-param: &rate_type-param
    name: rate_type
    in: query
    required: false
    schema:
      type: string
    description: Interest rate type for Greeks calculation

  rate_value-param: &rate_value-param
    name: rate_value
    in: query
    required: false
    schema:
      type: number
      format: double
    description: Interest rate value for Greeks calculation

  stock_price-param: &stock_price-param
    name: stock_price
    in: query
    required: false
    schema:
      type: number
      format: double
    description: Override underlying stock price for Greeks calculation

  greeks_version-param: &greeks_version-param
    name: version
    in: query
    required: false
    schema:
      type: string
    description: Greeks calculation model version

  use_market_value-param: &use_market_value-param
    name: use_market_value
    in: query
    required: false
    schema:
      type: boolean
    description: Use market value instead of midpoint for Greeks calculation

  underlyer_use_nbbo-param: &underlyer_use_nbbo-param
    name: underlyer_use_nbbo
    in: query
    required: false
    schema:
      type: boolean
    description: Use NBBO midpoint for underlying price

  # --- Common response schemas ---
  ohlc-tick: &ohlc-tick
    type: object
    properties:
      ms_of_day:
        type: integer
        description: Milliseconds since midnight ET
      open:
        type: integer
        description: Opening price (fixed-point, decode with price_type)
      high:
        type: integer
        description: Highest price (fixed-point)
      low:
        type: integer
        description: Lowest price (fixed-point)
      close:
        type: integer
        description: Closing price (fixed-point)
      volume:
        type: integer
        description: Number of shares/contracts traded
      count:
        type: integer
        description: Number of trades
      price_type:
        type: integer
        description: Decimal type for price decoding (real_price = value * 10^(price_type - 10))
      date:
        type: integer
        description: Date as YYYYMMDD integer

  trade-tick: &trade-tick
    type: object
    properties:
      ms_of_day:
        type: integer
        description: Milliseconds since midnight ET
      sequence:
        type: integer
        description: Exchange sequence number
      size:
        type: integer
        description: Trade size in shares
      price:
        type: integer
        description: Trade price (fixed-point, decode with price_type)
      exchange:
        type: integer
        description: Exchange code
      condition:
        type: integer
        description: Trade condition code
      price_type:
        type: integer
        description: Decimal type for price decoding
      date:
        type: integer
        description: Date as YYYYMMDD integer

  quote-tick: &quote-tick
    type: object
    properties:
      ms_of_day:
        type: integer
        description: Milliseconds since midnight ET
      bid:
        type: integer
        description: Bid price (fixed-point)
      ask:
        type: integer
        description: Ask price (fixed-point)
      bid_size:
        type: integer
        description: Bid size
      ask_size:
        type: integer
        description: Ask size
      price_type:
        type: integer
        description: Decimal type for price decoding
      date:
        type: integer
        description: Date as YYYYMMDD integer

  eod-tick: &eod-tick
    type: object
    properties:
      ms_of_day:
        type: integer
      open:
        type: integer
      high:
        type: integer
      low:
        type: integer
      close:
        type: integer
      volume:
        type: integer
      count:
        type: integer
      bid:
        type: integer
      ask:
        type: integer
      bid_size:
        type: integer
      ask_size:
        type: integer
      price_type:
        type: integer
      date:
        type: integer
        description: Date as YYYYMMDD integer

  open-interest-tick: &open-interest-tick
    type: object
    properties:
      ms_of_day:
        type: integer
      open_interest:
        type: integer
      date:
        type: integer

  trade-quote-tick: &trade-quote-tick
    type: object
    description: Combined trade + quote tick (25 fields)
    properties:
      ms_of_day:
        type: integer
      sequence:
        type: integer
      size:
        type: integer
      price:
        type: integer
      exchange:
        type: integer
      condition:
        type: integer
      bid:
        type: integer
      ask:
        type: integer
      bid_size:
        type: integer
      ask_size:
        type: integer
      price_type:
        type: integer
      date:
        type: integer

  greeks-result: &greeks-result
    type: object
    properties:
      value:
        type: number
        format: double
      delta:
        type: number
        format: double
      gamma:
        type: number
        format: double
      theta:
        type: number
        format: double
      vega:
        type: number
        format: double
      rho:
        type: number
        format: double
      iv:
        type: number
        format: double
      iv_error:
        type: number
        format: double
      vanna:
        type: number
        format: double
      charm:
        type: number
        format: double
      vomma:
        type: number
        format: double
      veta:
        type: number
        format: double
      speed:
        type: number
        format: double
      zomma:
        type: number
        format: double
      color:
        type: number
        format: double
      ultima:
        type: number
        format: double
      d1:
        type: number
        format: double
      d2:
        type: number
        format: double
      dual_delta:
        type: number
        format: double
      dual_gamma:
        type: number
        format: double
      epsilon:
        type: number
        format: double
      lambda:
        type: number
        format: double

  data-table: &data-table
    type: object
    description: Generic DataTable with string headers and typed cell values
    properties:
      headers:
        type: array
        items:
          type: string
      data_table:
        type: array
        items:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
              - type: number
              - type: "null"

  symbol-list: &symbol-list
    type: array
    items:
      type: string

  date-list: &date-list
    type: array
    items:
      type: string
      pattern: '^\d{8}$'

  # --- Reusable response wrappers ---
  ohlc-response: &ohlc-response
    description: Successful response
    content:
      application/json:
        schema:
          type: array
          items: *ohlc-tick

  trade-response: &trade-response
    description: Successful response
    content:
      application/json:
        schema:
          type: array
          items: *trade-tick

  quote-response: &quote-response
    description: Successful response
    content:
      application/json:
        schema:
          type: array
          items: *quote-tick

  eod-response: &eod-response
    description: Successful response
    content:
      application/json:
        schema:
          type: array
          items: *eod-tick

  data-table-response: &data-table-response
    description: Successful response
    content:
      application/json:
        schema: *data-table

  symbol-list-response: &symbol-list-response
    description: Successful response
    content:
      application/json:
        schema: *symbol-list

  date-list-response: &date-list-response
    description: Successful response
    content:
      application/json:
        schema: *date-list

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:

  # =========================================================================
  # STOCK / LIST
  # =========================================================================

  /stock/list/symbols:
    x-min-subscription: free
    get:
      operationId: stockListSymbols
      summary: List all stock symbols
      description: |
        Returns all traded stock symbols. Updated overnight.
        gRPC: GetStockListSymbols
      tags: [Stock / List]
      parameters: []
      responses:
        '200': *symbol-list-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let symbols = tdx.stock_list_symbols().await?;
        - lang: python
          label: Python
          source: |
            symbols = tdx.stock_list_symbols()
        - lang: go
          label: Go
          source: |
            symbols, err := client.StockListSymbols()
        - lang: cpp
          label: C++
          source: |
            auto symbols = client.stock_list_symbols();

  /stock/list/dates:
    x-min-subscription: free
    get:
      operationId: stockListDates
      summary: List available dates for a stock
      description: |
        Lists all dates of data available for a stock by request type (EOD, TRADE, QUOTE, etc.).
        Updated overnight.
        gRPC: GetStockListDates
      tags: [Stock / List]
      parameters:
        - *request_type-param
        - *symbol-param
      responses:
        '200': *date-list-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let dates = tdx.stock_list_dates("TRADE", "AAPL").await?;
        - lang: python
          label: Python
          source: |
            dates = tdx.stock_list_dates("TRADE", "AAPL")
        - lang: go
          label: Go
          source: |
            dates, err := client.StockListDates("TRADE", "AAPL")
        - lang: cpp
          label: C++
          source: |
            auto dates = client.stock_list_dates("TRADE", "AAPL");

  # =========================================================================
  # STOCK / SNAPSHOT
  # =========================================================================

  /stock/snapshot/ohlc:
    x-min-subscription: value
    get:
      operationId: stockSnapshotOhlc
      summary: Stock OHLC snapshot
      description: |
        Real-time Open, High, Low, Close for the current trading day.
        Returns real-time data with standard/pro subscription, 15-minute delayed with value subscription.
        Snapshot cache resets at midnight ET daily.
        gRPC: GetStockSnapshotOhlc
      tags: [Stock / Snapshot]
      parameters:
        - *symbols-param
        - *venue-param
        - *min_time-param
      responses:
        '200': *ohlc-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let ohlc = tdx.stock_snapshot_ohlc(&["AAPL"]).await?;
        - lang: python
          label: Python
          source: |
            ohlc = tdx.stock_snapshot_ohlc(["AAPL"])
        - lang: go
          label: Go
          source: |
            ohlc, err := client.StockSnapshotOHLC([]string{"AAPL"})
        - lang: cpp
          label: C++
          source: |
            auto ohlc = client.stock_snapshot_ohlc({"AAPL"});

  /stock/snapshot/trade:
    x-min-subscription: standard
    get:
      operationId: stockSnapshotTrade
      summary: Stock trade snapshot
      description: |
        Real-time last trade from the Nasdaq Basic feed.
        Requires stocks standard or pro subscription.
        Snapshot cache resets at midnight ET daily.
        gRPC: GetStockSnapshotTrade
      tags: [Stock / Snapshot]
      parameters:
        - *symbols-param
        - *venue-param
        - *min_time-param
      responses:
        '200': *trade-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let trades = tdx.stock_snapshot_trade(&["AAPL"]).await?;
        - lang: python
          label: Python
          source: |
            trades = tdx.stock_snapshot_trade(["AAPL"])
        - lang: go
          label: Go
          source: |
            trades, err := client.StockSnapshotTrade([]string{"AAPL"})
        - lang: cpp
          label: C++
          source: |
            auto trades = client.stock_snapshot_trade({"AAPL"});

  /stock/snapshot/quote:
    x-min-subscription: value
    get:
      operationId: stockSnapshotQuote
      summary: Stock quote snapshot
      description: |
        Real-time last BBO quote from the Nasdaq Basic feed (standard/pro) or
        15-minute delayed NBBO quote from UTP/CTA feeds (value subscription).
        Snapshot cache resets at midnight ET daily.
        gRPC: GetStockSnapshotQuote
      tags: [Stock / Snapshot]
      parameters:
        - *symbols-param
        - *venue-param
        - *min_time-param
      responses:
        '200': *quote-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let quotes = tdx.stock_snapshot_quote(&["AAPL"]).await?;
        - lang: python
          label: Python
          source: |
            quotes = tdx.stock_snapshot_quote(["AAPL"])
        - lang: go
          label: Go
          source: |
            quotes, err := client.StockSnapshotQuote([]string{"AAPL"})
        - lang: cpp
          label: C++
          source: |
            auto quotes = client.stock_snapshot_quote({"AAPL"});

  /stock/snapshot/market_value:
    x-min-subscription: standard
    get:
      operationId: stockSnapshotMarketValue
      summary: Stock market value snapshot
      description: |
        Latest market value snapshot for one or more stocks.
        gRPC: GetStockSnapshotMarketValue
      tags: [Stock / Snapshot]
      parameters:
        - *symbols-param
        - *venue-param
        - *min_time-param
      responses:
        '200': *data-table-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let mv = tdx.stock_snapshot_market_value(&["AAPL"]).await?;
        - lang: python
          label: Python
          source: |
            mv = tdx.stock_snapshot_market_value(["AAPL"])
        - lang: go
          label: Go
          source: |
            mv, err := client.StockSnapshotMarketValue([]string{"AAPL"})
        - lang: cpp
          label: C++
          source: |
            auto mv = client.stock_snapshot_market_value({"AAPL"});

  # =========================================================================
  # STOCK / HISTORY
  # =========================================================================

  /stock/history/eod:
    x-min-subscription: free
    get:
      operationId: stockHistoryEod
      summary: Stock end-of-day history
      description: |
        End-of-day stock data for a date range including OHLC + closing quote.
        gRPC: GetStockHistoryEod
      tags: [Stock / History]
      parameters:
        - *symbol-param
        - *start_date-param
        - *end_date-param
      responses:
        '200': *eod-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let eod = tdx.stock_history_eod("AAPL", "20240101", "20240301").await?;
        - lang: python
          label: Python
          source: |
            eod = tdx.stock_history_eod("AAPL", "20240101", "20240301")
            df = tdx.stock_history_eod_df("AAPL", "20240101", "20240301")
        - lang: go
          label: Go
          source: |
            eod, err := client.StockHistoryEOD("AAPL", "20240101", "20240301")
        - lang: cpp
          label: C++
          source: |
            auto eod = client.stock_history_eod("AAPL", "20240101", "20240301");

  /stock/history/ohlc:
    x-min-subscription: value
    get:
      operationId: stockHistoryOhlc
      summary: Stock intraday OHLC bars
      description: |
        Intraday OHLC bars for a single date or date range.
        Interval is in milliseconds (e.g. "60000" for 1-minute bars).
        Use start_date/end_date instead of date for multi-day queries.
        gRPC: GetStockHistoryOhlc
      tags: [Stock / History]
      parameters:
        - *symbol-param
        - *date-optional-param
        - *interval-param
        - *start_time-param
        - *end_time-param
        - *venue-param
        - name: start_date
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{8}$'
          description: Start date for multi-day range (YYYYMMDD)
        - name: end_date
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{8}$'
          description: End date for multi-day range (YYYYMMDD)
      responses:
        '200': *ohlc-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            // Single date
            let bars = tdx.stock_history_ohlc("AAPL", "20240315", "60000").await?;
            // Date range
            let bars = tdx.stock_history_ohlc_range("AAPL", "20240101", "20240301", "60000").await?;
        - lang: python
          label: Python
          source: |
            bars = tdx.stock_history_ohlc("AAPL", "20240315", "60000")
            bars = tdx.stock_history_ohlc_range("AAPL", "20240101", "20240301", "60000")
        - lang: go
          label: Go
          source: |
            bars, err := client.StockHistoryOHLC("AAPL", "20240315", "60000")
            bars, err := client.StockHistoryOHLCRange("AAPL", "20240101", "20240301", "60000")
        - lang: cpp
          label: C++
          source: |
            auto bars = client.stock_history_ohlc("AAPL", "20240315", "60000");
            auto bars = client.stock_history_ohlc_range("AAPL", "20240101", "20240301", "60000");

  /stock/history/trade:
    x-min-subscription: standard
    get:
      operationId: stockHistoryTrade
      summary: Stock trade history
      description: |
        All trades for a stock on a given date or date range.
        gRPC: GetStockHistoryTrade
      tags: [Stock / History]
      parameters:
        - *symbol-param
        - *date-optional-param
        - *start_time-param
        - *end_time-param
        - *venue-param
        - name: start_date
          in: query
          required: false
          schema:
            type: string
          description: Start date for multi-day range (YYYYMMDD)
        - name: end_date
          in: query
          required: false
          schema:
            type: string
          description: End date for multi-day range (YYYYMMDD)
      responses:
        '200': *trade-response
      x-code-examples:
        - lang: rust
          label: Rust
          source: |
            let trades = tdx.stock_history_trade("AAPL", "20240315").await?;
        - lang: python
          label: Python
          source: |
            trades = tdx.stock_history_trade("AAPL", "20240315")
        - lang: go
          label: Go
          source: |
            trades, err := client.StockHistoryTrade("AAPL", "20240315")
        - lang: cpp
          label: C++
          source: |
            auto trades = client.stock_history_trade("AAPL", "20240315");

  /stock/history/quote:
    x-min-subscription: value
    get:
      operationId: stockHistoryQuote
      summary: Stock quote history
      description: |
